name: Daily master sync

on:
  schedule:
    # Run daily at 10:00 UTC (after nightly-testing has settled)
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-master:
    runs-on: ubuntu-latest
    if: github.repository != 'leanprover-community/mathlib4'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: master
          fetch-depth: 0

      - name: Sync master from upstream
        run: |
          git remote add upstream https://github.com/leanprover-community/mathlib4.git
          git fetch upstream master
          if [ "$(git rev-parse master)" = "$(git rev-parse upstream/master)" ]; then
            echo "master is already up to date"
          else
            git merge --ff-only upstream/master
            git push origin master
            echo "Updated master to upstream/master"
          fi
